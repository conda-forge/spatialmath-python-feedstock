{% set name = "spatialmath-python" %}
{% set version = "1.1.16" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: eb2f043b1c57baab034c01d6d3028eab80f5ec68eaa2ec89cb9572107c336a22
  patches:
    - 173.patch

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - ansitable
    - colored >=2.0.0,<3
    - matplotlib-base
    - numpy
    - python >={{ python_min }}
    - scipy
    - sympy
    - sphinxcontrib-jsmath
    - typing-extensions
    - pre_commit

test:
  imports:
    - spatialmath
    - spatialmath.base
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/bdaiinstitute/spatialmath-python
  summary: Provides spatial maths capability for Python.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Tobias-Fischer
    - petercorke
